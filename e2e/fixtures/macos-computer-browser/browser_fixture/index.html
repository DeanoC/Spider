<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spider Browser Fixture</title>
  <style>
    :root {
      color-scheme: light;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    body {
      margin: 0;
      padding: 32px;
      background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
      color: #0f172a;
    }
    main {
      max-width: 680px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.10);
    }
    h1 {
      margin-top: 0;
      font-size: 30px;
    }
    p {
      line-height: 1.5;
    }
    .controls {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }
    input, button {
      font: inherit;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
    }
    button {
      cursor: pointer;
      background: #0f172a;
      color: white;
    }
    #fixture-status {
      margin-top: 24px;
      font-weight: 700;
      color: #14532d;
    }
    #fixture-preview {
      margin-top: 8px;
      color: #334155;
    }
  </style>
</head>
<body>
  <main>
    <h1 id="fixture-title">Spider Browser Fixture</h1>
    <p id="fixture-copy">This page is used by the macOS browser venom smoke lane.</p>
    <div class="controls">
      <input id="fixture-input" type="text" value="" placeholder="Type via browser venom">
      <button id="fixture-button" type="button">Apply Fixture Action</button>
    </div>
    <div id="fixture-status">idle</div>
    <div id="fixture-preview">preview:</div>
  </main>
  <script>
    const input = document.querySelector("#fixture-input");
    const button = document.querySelector("#fixture-button");
    const status = document.querySelector("#fixture-status");
    const preview = document.querySelector("#fixture-preview");

    function updatePreview() {
      preview.textContent = `preview:${input.value}`;
      document.body.dataset.preview = input.value;
    }

    input.addEventListener("input", updatePreview);
    button.addEventListener("click", () => {
      status.textContent = `clicked:${input.value}`;
      document.body.dataset.status = status.textContent;
    });

    updatePreview();
  </script>
</body>
</html>
